name: Build luci-app-fileassistant

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Plugin Code
        uses: actions/checkout@v4
        with:
          path: luci-app-fileassistant

      - name: Download OpenWrt SDK
        run: |
          # 使用修正后的 SDK 链接 (generic-armv8)
          wget https://downloads.openwrt.org/releases/23.05.0/targets/generic/armv8/openwrt-sdk-23.05.0-generic-armv8_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* openwrt_sdk

      - name: Prepare Build Environment
        run: |
          cd openwrt_sdk
          # 更新 feeds
          ./scripts/feeds update -a
          # 安装 feeds (如果需要)
          # ./scripts/feeds install -a
          # 复制插件到 package 目录
          ln -s $GITHUB_WORKSPACE/luci-app-fileassistant package/luci-app-fileassistant

      - name: Compile Package
        run: |
          cd openwrt_sdk
          # 这里根据你的需求调整编译命令
          make defconfig
          make package/luci-app-fileassistant/compile V=s

      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # 这里已更新为 v4
        with:
          name: luci-app-fileassistant-ipk
          path: openwrt_sdk/bin/packages/*/base/luci-app-fileassistant_*.ipk
