name: Build luci-app-fileassistant for A53

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Plugin Code
        uses: actions/checkout@v4
        with:
          path: luci-app-fileassistant

      - name: Download OpenWrt SDK
        run: |
          # 修正了这里的下载链接，指向 cortex-a53
          wget https://downloads.openwrt.org/releases/23.05.0/targets/rockchip/armv8/openwrt-sdk-23.05.0-rockchip-armv8_cortex-a53_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* openwrt_sdk

      - name: Prepare Build Environment
        run: |
          # 将你的插件复制到 SDK 的 package 目录
          cp -r luci-app-fileassistant openwrt_sdk/package/

          # 进入 SDK 目录
          cd openwrt_sdk

          # 更新 feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # 配置编译选项（只编译你的插件）
          echo "CONFIG_PACKAGE_luci-app-fileassistant=m" >> .config
          make defconfig

      - name: Compile Package
        run: |
          cd openwrt_sdk
          # 开始编译，-j$(nproc) 表示使用所有CPU核心加速
          make package/luci-app-fileassistant/compile -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipk
          # 修正了这里的路径查找规则，使用通配符匹配具体架构文件夹
          path: openwrt_sdk/bin/packages/aarch64_cortex-a53/packages/luci-app-fileassistant_*.ipk
