name: Build luci-app-fileassistant for A53

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Package
        # 使用官方维护的编译脚本
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: aarch64_cortex-a53-23.05
          FEEDNAME: packages_ci
          NO_REFRESH_CHECK: true
