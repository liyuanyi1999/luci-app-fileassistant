name: Build luci-app-fileassistant for A53

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Plugin Code
        uses: actions/checkout@v4
        with:
          path: luci-app-fileassistant

      - name: Download OpenWrt SDK (Using Tsinghua Mirror)
        run: |
          # 使用清华镜像站下载，速度和稳定性更好
          wget https://mirrors.tuna.tsinghua.edu.cn/openwrt/releases/23.05.0/targets/generic/armv8/openwrt-sdk-23.05.0-generic-armv8_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* openwrt_sdk

      - name: Prepare Build Environment
        run: |
          cd openwrt_sdk
          # 更新 feeds
          ./scripts/feeds update -a
          # 安装 feeds (如果需要)
          # ./scripts/feeds install -a

      - name: Compile Package
        run: |
          cd openwrt_sdk
          # 将你的插件链接到 package 目录
          ln -s $GITHUB_WORKSPACE/luci-app-fileassistant package/luci-app-fileassistant

          # 开始编译
          make package/luci-app-fileassistant/compile V=s

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-fileassistant
          path: openwrt_sdk/bin/packages/aarch64_cortex-a53/base/luci-app-fileassistant_*.ipk
