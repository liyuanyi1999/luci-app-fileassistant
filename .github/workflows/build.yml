name: Build luci-app-fileassistant

on:
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex libncurses5-dev gawk git libssl-dev gettext libz-dev wget unzip python3 python3-pip

      - name: Clone OpenWrt source
        run: |
          git clone https://github.com/openwrt/openwrt -b openwrt-23.05 --depth=1 openwrt

      - name: Add luci-app-fileassistant
        run: |
          cd openwrt/package
          git clone https://github.com/liyuanyi1999/luci-app-fileassistant.git

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Config
        run: |
          cd openwrt
          make defconfig
          # 启用插件
          echo "CONFIG_PACKAGE_luci-app-fileassistant=m" >> .config

      - name: Download
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: Compile
        run: |
          cd openwrt
          make package/luci-app-fileassistant/compile V=s -j$(nproc)

      - name: Upload ipk
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-fileassistant
          path: openwrt/bin/packages/*/luci/luci-app-fileassistant*.ipk
