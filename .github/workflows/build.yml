name: Build fileassistant A53 (Fixed csstidy)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装编译依赖
        run: |
          sudo apt update && sudo apt install -y build-essential flex bison gawk git libssl-dev libncurses-dev gettext unzip wget libz-dev libssl-dev

      - name: 拉取 OpenWrt 23.05 源码
        run: |
          git clone https://github.com/openwrt/openwrt -b openwrt-23.05 --depth=1 openwrt
          cd openwrt/package
          git clone https://github.com/liyuanyi1999/luci-app-fileassistant.git

      - name: 初始化 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 配置（锁定A53架构 + 禁用CSS压缩）
        run: |
          cd openwrt
          make defconfig
          # 强制AArch64 Cortex-A53
          echo "CONFIG_TARGET_armvirt=y" >> .config
          echo "CONFIG_TARGET_armvirt_64=y" >> .config
          echo "CONFIG_CPU_TYPE_CORTEX_A53=y" >> .config
          # 禁用 csstidy 压缩，避免依赖失败
          echo "CONFIG_LUCI_CSSTIDY=n" >> .config
          echo "CONFIG_PACKAGE_luci-app-fileassistant=m" >> .config
          make olddefconfig

      - name: 下载依赖
        run: cd openwrt && make download -j4

      - name: 编译插件（单线程编译，方便看日志）
        run: cd openwrt && make package/luci-app-fileassistant/compile V=s -j1

      - name: 上传IPK
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-fileassistant_A53
          path: openwrt/bin/packages/aarch64_cortex-a53/luci/*.ipk
