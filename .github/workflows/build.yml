name: Build luci-app-fileassistant for A53

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Package
        uses: unifreq/openwrt-package-builder@master
        with:
          # 指定 OpenWrt 版本
          openwrt_version: 23.05
          # 指定目标架构
          target: aarch64_cortex-a53
