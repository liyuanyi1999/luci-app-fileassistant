name: Build luci-app-fileassistant for A53

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Plugin Code
        uses: actions/checkout@v4
        with:
          path: luci-app-fileassistant

      - name: Download OpenWrt SDK
        run: |
          # 已核实：文件名中去掉了 armv8，路径为 generic/cortex-a53
          wget https://downloads.openwrt.org/releases/23.05.0/targets/generic/cortex-a53/openwrt-sdk-23.05.0-generic-cortex-a53_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* openwrt_sdk

      - name: Prepare Build Environment
        run: |
          # 复制插件到 SDK 目录
          cp -rf luci-app-fileassistant openwrt_sdk/package/
          # 更新 feeds
          cd openwrt_sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Compile Package
        run: |
          cd openwrt_sdk
          # 编译插件
          make package/luci-app-fileassistant/compile V=s

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-fileassistant
          # 注意：这里路径根据 SDK 解压后的标准结构设定
          path: openwrt_sdk/bin/packages/aarch64_cortex-a53/packages/luci-app-fileassistant_*.ipk
