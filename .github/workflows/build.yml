name: Build luci-app-fileassistant for A53

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Package
        # 使用支持国内网络优化的构建脚本
        uses: unifreq/openwrt-package-builder@main
        with:
          target: aarch64_cortex_a53
          openwrt_version: 23.05
