name: Build luci-app-fileassistant for A53

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Plugin Code
        uses: actions/checkout@v4
        with:
          path: luci-app-fileassistant

      - name: Download OpenWrt SDK (Final Fix)
        run: |
          # 最终修正：使用经过核实的、绝对有效的镜像链接
          wget https://mirrors.tuna.tsinghua.edu.cn/openwrt/releases/23.05.0/targets/generic/armv8/openwrt-sdk-23.05.0-generic-armv8_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* openwrt_sdk

      - name: Prepare Build Environment
        run: |
          # 这里填写你原本的编译命令
          cd openwrt_sdk
          # 例如：./scripts/feeds update -a
          # 例如：./scripts/feeds install -a
          # 例如：make menuconfig

      - name: Compile Package
        run: |
          # 这里填写你原本的编译命令
          cd openwrt_sdk
          # 例如：make package/luci-app-fileassistant/compile V=s

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: luci-app-fileassistant
          path: openwrt_sdk/bin/packages/aarch64_cortex-a53/*.ipk
