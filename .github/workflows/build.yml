name: Build luci-app-fileassistant

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Plugin Code
        uses: actions/checkout@v4
        with:
          path: luci-app-fileassistant

      - name: Download OpenWrt SDK (Filename Fixed)
        run: |
          # 核心修正：去掉了文件名中间的 _gcc-12.3.0 部分，这才是真实的文件名
          wget https://downloads.openwrt.org/releases/23.05.0/targets/generic/armv8/openwrt-sdk-23.05.0-generic-armv8_musl.Linux-x86_64.tar.xz
          
          # 解压
          tar -xf openwrt-sdk-*.tar.xz
          
          # 重命名文件夹方便后续操作
          mv openwrt-sdk-* openwrt_sdk

      - name: Prepare Build Environment
        run: |
          cd openwrt_sdk
          # 更新 feeds
          ./scripts/feeds update -a
          # 安装 feeds
          ./scripts/feeds install -a
          # 这里可以继续添加你的编译命令
