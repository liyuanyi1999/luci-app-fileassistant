name: Build luci-app-fileassistant for A53

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Plugin Code
        uses: actions/checkout@v4
        with:
          path: luci-app-fileassistant

      - name: Download OpenWrt SDK
        run: |
          # 再次修正链接，路径改为 targets/generic/cortex-a53
          wget https://downloads.openwrt.org/releases/23.05.0/targets/generic/cortex-a53/openwrt-sdk-23.05.0-generic-armv8_cortex-a53_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* openwrt_sdk

      - name: Prepare Build Environment
        run: |
          # 复制插件到 SDK 目录
          cp -rf luci-app-fileassistant openwrt_sdk/package/

          # 进入 SDK 目录
          cd openwrt_sdk

          # 更新 feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # 配置编译选项
          echo "CONFIG_PACKAGE_luci-app-fileassistant=m" >> .config
          make defconfig

      - name: Compile Package
        run: |
          cd openwrt_sdk
          # 开始编译插件
          make package/luci-app-fileassistant/compile V=s

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipk
          # 注意这里的路径，根据 SDK 解压后的实际架构路径调整
          # 对于 generic/cortex-a53，路径通常是 bin/packages/aarch64_cortex-a53/
          path: |
            openwrt_sdk/bin/packages/aarch64_cortex-a53/packages/luci-app-fileassistant_*.ipk
