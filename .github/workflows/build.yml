name: Build fileassistant A53 (SDK 方式)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt update && sudo apt install -y build-essential flex bison gawk libssl-dev libncurses-dev wget unzip

      - name: 下载 A53 架构的 OpenWrt SDK
        run: |
          wget https://downloads.openwrt.org/releases/23.05.3/targets/armvirt/64/openwrt-sdk-23.05.3-armvirt-64_gcc-12.3.0-musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* openwrt-sdk
          cd openwrt-sdk/package
          git clone https://github.com/liyuanyi1999/luci-app-fileassistant.git

      - name: 配置 SDK
        run: |
          cd openwrt-sdk
          echo "CONFIG_PACKAGE_luci-app-fileassistant=m" >> .config
          echo "CONFIG_LUCI_CSSTIDY=n" >> .config
          make defconfig

      - name: 编译插件
        run: cd openwrt-sdk && make package/luci-app-fileassistant/compile V=s -j1

      - name: 上传 IPK
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-fileassistant_A53
          path: openwrt-sdk/bin/packages/aarch64_cortex-a53/luci/*.ipk
