name: Build fileassistant A53 (Fixed olddefconfig)
on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt update && sudo apt install -y build-essential flex bison gawk git libssl-dev libncurses-dev gettext unzip wget

      - name: 拉取 OpenWrt 23.05 源码 + 插件
        run: |
          git clone https://github.com/openwrt/openwrt -b openwrt-23.05 --depth=1 openwrt
          cd openwrt/package
          git clone https://github.com/liyuanyi1999/luci-app-fileassistant.git

      - name: 初始化 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 配置（标准方式生成，不手动写死）
        run: |
          cd openwrt
          make defconfig
          # 用 make config 自动配置，避免手动写死 .config 导致的 olddefconfig 失败
          echo "CONFIG_PACKAGE_luci-app-fileassistant=m" >> .config
          echo "CONFIG_LUCI_CSSTIDY=n" >> .config
          # 关键：不手动指定 TARGET，用默认的 armvirt_64 即可适配 A53
          make defconfig

      - name: 下载依赖
        run: cd openwrt && make download -j4

      - name: 编译插件（单线程，方便看日志）
        run: cd openwrt && make package/luci-app-fileassistant/compile V=s -j1

      - name: 上传 IPK
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-fileassistant_A53
          path: openwrt/bin/packages/aarch64_cortex-a53/luci/*.ipk
