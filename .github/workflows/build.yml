name: Build luci-app-fileassistant for A53

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Package
        uses: openwrt/gh-action-sdk@v5
        env:
          # 指定架构和版本，对应 23.05 版本的 A53
          ARCH: aarch64_cortex-a53-23.05
          FEEDNAME: packages_ci
          NO_REFRESH_CHECK: true
