name: Build luci-app-fileassistant for A53

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Plugin Code
        uses: actions/checkout@v4
        with:
          path: luci-app-fileassistant

      - name: Download OpenWrt SDK (Auto Detect)
        run: |
          # 定义基础 URL
          BASE_URL="https://downloads.openwrt.org/releases/23.05.0/targets/generic/armv8"

          # 1. 获取文件列表并筛选出 SDK 文件名
          # 这一步会自动找到正确的文件名，不管它叫 generic-armv8 还是 generic-cortex-a53
          SDK_FILE=$(curl -s $BASE_URL/ | grep -oP 'href="\Kopenwrt-sdk-[^"]+\.tar\.xz' | head -n 1)

          # 检查是否找到了文件
          if [ -z "$SDK_FILE" ]; then
            echo "错误：未在 $BASE_URL 找到 SDK 文件！"
            exit 1
          fi

          echo "找到 SDK 文件: $SDK_FILE"

          # 2. 下载找到的文件
          wget $BASE_URL/$SDK_FILE

          # 3. 解压
          tar -xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* openwrt_sdk

      - name: Prepare Build Environment
        run: |
          # 你的后续编译命令...
