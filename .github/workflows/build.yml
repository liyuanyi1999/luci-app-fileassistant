name: Build luci-app-fileassistant for A53

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Plugin Code
        uses: actions/checkout@v4
        with:
          path: luci-app-fileassistant

      - name: Download OpenWrt SDK
        run: |
          # 这里修正了路径，使用 generic 而不是 rockchip
          wget https://downloads.openwrt.org/releases/23.05.0/targets/generic/armv8/openwrt-sdk-23.05.0-generic-armv8_cortex-a53_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* openwrt_sdk

      - name: Prepare Build Environment
        run: |
          # 将插件代码复制到 SDK 的 package 目录
          cp -r luci-app-fileassistant openwrt_sdk/package/

      - name: Compile Package
        run: |
          cd openwrt_sdk
          # 更新 feed
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          # 编译插件
          make package/luci-app-fileassistant/compile V=s

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipk
          # 这里修正了路径中的下划线问题，确保能找到 .ipk 文件
          path: openwrt_sdk/bin/packages/aarch64_cortex-a53/base/luci-app-fileassistant_*.ipk
