name: Build luci-app-fileassistant for A53

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Package
        # 更换了工具地址，使用 sbwml 维护的版本
        uses: sbwml/openwrt-package-builder@main
        with:
          # 架构保持不变
          target: aarch64_cortex_a53
          # 版本保持不变
          openwrt_version: 23.05
